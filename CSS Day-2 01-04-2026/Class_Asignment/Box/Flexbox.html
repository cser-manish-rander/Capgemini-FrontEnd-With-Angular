<!DOCTYPE html>
<html>
<head>
<style>

body {
    margin: 0;
    font-family: Arial;
    background: #f4f4f4;
}


.container {
    display: flex;

    flex-direction: row;              /* row layout */
    justify-content: space-evenly;    /* horizontal spacing */
    align-items: center;              /* vertical alignment */

    flex-wrap: wrap;                  /* wrap items */
    gap: 20px;                        /* space between items */

    height: 100vh;
    padding: 20px;
}


.box {
    background: white;
    padding: 20px;
    width: 150px;
    text-align: center;

    border-radius: 10px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.2);

    flex-grow: 1;      /* expand */
    flex-basis: 150px; /* base size */
}


.box2 {
    flex-grow: 2; /* grows more than others */
}

</style>
</head>
<body>

<div class="container">
    <div class="box">Box 1</div>
    <div class="box box2">Box 2 (Grow 2x)</div>
    <div class="box">Box 3</div>
    <div class="box">Box 4</div>
</div>

</body>
</html>
