<!DOCTYPE html>
<html>
<head>
<style>

body {
    background: #f4f4f4;
    padding: 50px;
}

/* Card with shadow */
.card {
    width: 250px;
    padding: 20px;
    background: white;
    border-radius: 10px;
    background-color: black;
    box-shadow: 10px 0 4px 10px rgba(24, 14, 14, 0.2);
}

/* Text shadow */
h2 {
    font-size: 500;
    color: red;
    text-shadow: 2px 2px 3px rgb(250, 249, 249);
}
p{
    font-size: 50;
    color: rgb(243, 241, 241);
}

</style>
</head>
<body>

<center><div class="card">
    <center><h2>HI</h2></center>
    <p> box-shadow + text-shadow.</p>
</div></center>
</body>
</html>
