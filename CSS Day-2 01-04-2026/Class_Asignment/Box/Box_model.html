<!DOCTYPE html>
<html>
<head>
<style>

body {
    margin: 0;
    padding: 20px;
    background: #eee;
}

/* MAIN CONTAINER */
.container {
    width: 300px;
    height: 300px;

    border: 3px solid rgb(21, 214, 69);
    background: #f1f0ef;
    flex-wrap: nowrap;
    display: flex;
    justify-content: space-around; /* spacing between boxes */
    align-items: flex-end;       /* top alignment */
    padding-top: 20px;
    padding-bottom: 20px;

}

/* RED BOXES */
.box {
    width: 80px;
    height: 80px;
    background: red;
    border: solid;
    gap: 20px;
}

</style>
</head>
<body>

<div class="container">
    <div class="box">1</div>
    <div class="box">2</div>
    <div class="box">3</div>
    
</div>

</body>
</html>
