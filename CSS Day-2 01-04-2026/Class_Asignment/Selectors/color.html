<!DOCTYPE html>
<html>
<head>
<style>

h1 {
    color: blue; /* Name */
}

p {
    color: #ff5733; /* HEX */
}

h2 {
    color: rgb(0, 128, 0); /* RGB */
}

h3 {
    color: rgba(255, 0, 0, 0.5); /* RGBA */
}

h4 {
    color: hsl(240, 100%, 50%); /* HSL */
}

</style>
</head>
<body>

    <h1>Color Name</h1>
<p>HEX Color</p>
<h2>RGB Color</h2>
<h3>RGBA Color</h3>
<h4>HSL Color</h4>

</body>
</html>
