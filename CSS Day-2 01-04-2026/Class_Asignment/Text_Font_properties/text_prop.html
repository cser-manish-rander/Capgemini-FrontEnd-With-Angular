<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>

h1 {
    text-align: center;
    text-transform: uppercase;
    text-shadow: 2px 2px 5px gray;
}

p {
    color: blue;
    text-indent: 30px;
    letter-spacing: 1px;
    line-height: 1.6;
}

a {
    text-decoration: none;
}

</style>
    <title>Document</title>
</head>
<body>
  <h1>CSS Text Properties</h1>

    <p>
    This is a paragraph showing spacing, indentation, and line height.
    </p>

    <a href="#">Click Here</a>
 
</body>
</html>
