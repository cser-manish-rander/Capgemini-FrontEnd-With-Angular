<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>

body {
    font-family: Arial, sans-serif;
}

h1 {
    font-size: 30px;
    font-weight: bold;
    letter-spacing: 2px;
}

p {
    font-size: 16px;

    text-transform: uppercase;
    font-variant: small-caps;
}

</style>

</head>
<body>
    <h1>Welcome to CSS Fonts</h1>

<p>This is a paragraph with <span>styled text</span>.</p>
</body>
</html>
