<!DOCTYPE html>
<html>
<head>
    <title>Text & Font Styling</title>

    <style>

        body {
            font-family: 'Poppins', Arial, sans-serif , ;
            background-color: #e6d708;
            margin: 0;
            padding: 20px;
        }

        h1 {
            font-size: 36px;
            font-weight: bolder;
            text-align: center;
            text-transform: uppercase;
            letter-spacing: 5px;
            color: #2c3e50;
        }

        p {
            font-size: 18px;
            line-height: 1.6;
            text-align: justify;
            color: #555;
            letter-spacing: 3px;
        }

        .highlight {
            font-weight: bolder;
            font-style: oblique;
            color: #e74c3c;
            text-decoration: underline;
        }

        a {
            text-decoration: line-through;
            color: #db344a;
            font-weight: bold;
        }

        a:hover {
            text-decoration: underline;
            color: #1d6fa5;
        }

    </style>
</head>

<body>

    <h1>Welcome to Typography</h1>

    <p>
        This is a simple example showing how <span class="highlight">font and text properties</span> 
        work together to create a clean and readable design. Good typography makes your website 
        look professional and easy to understand.
    </p>

    <p>
        Visit <a href="#">this link</a> to explore more about CSS styling.
    </p>

</body>
</html>
